<div class="page-layout">
  <app-sidebar [role]="auth.isAdmin() ? 'admin' : 'employee'" />

  <main class="page-content">
    <header class="page-header">
      <div>
        <h1>الشكاوى</h1>
        <p>إدارة ومتابعة الشكاوى والمقترحات</p>
      </div>
      <a *ngIf="!auth.isAdmin()" routerLink="/employee/complaints/new" class="btn-danger">+ شكوى جديدة</a>
    </header>

    <div class="filters-bar">
      <input type="text" [(ngModel)]="searchTerm" (change)="load()" placeholder="ابحث عن شكوى..." class="search-input" />
      <select [(ngModel)]="priorityFilter" (change)="load()">
        <option value="all">الأولوية: الكل</option>
        <option *ngFor="let p of priorityOptions" [ngValue]="p.value">{{ p.label }}</option>
      </select>
      <select [(ngModel)]="statusFilter" (change)="load()">
        <option value="all">الحالة: الكل</option>
        <option *ngFor="let s of statusOptions" [ngValue]="s.value">{{ s.label }}</option>
      </select>
    </div>

    <p class="result-count" *ngIf="result() as r">{{ r.totalCount }} شكوى</p>

    <div class="complaint-card" *ngFor="let c of result()?.items" [routerLink]="['/', auth.isAdmin() ? 'admin' : 'employee', 'complaints', c.id]">
      <div class="complaint-card__main">
        <div class="complaint-card__title-row">
          <strong>{{ c.subject }}</strong>
          <span class="muted">#{{ c.complaintNumber }}</span>
        </div>
        <p>{{ c.description }}</p>
      </div>
      <div class="complaint-card__meta">
        <app-priority-badge [priority]="c.priority" />
        <app-status-badge [status]="c.status" />
      </div>
    </div>

    <p class="empty-state" *ngIf="result() && result()!.items.length === 0">لا توجد شكاوى مطابقة</p>
  </main>
</div>
